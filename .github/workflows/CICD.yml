name: .NET CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:

    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore WebAppBuild/WebAppBuild.slnx

    - name: Build solution
      run: dotnet build WebAppBuild/WebAppBuild.slnx --configuration Release --no-restore

    - name: Publish app
      run: dotnet publish WebAppBuild/WebAppBuild.slnx -c Release -o publish --no-build

    # STOP IIS (optional but recommended if using IIS)
    - name: Stop IIS site
      run: |
        iisreset /stop

    # Deploy files
    - name: Deploy to server folder
      run: |
        xcopy publish C:\Deploy\WebAppBuild /E /H /C /I /Y

    # START IIS again
    - name: Start IIS site
      run: |
        iisreset /start
