name: .NET CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-publish:

    runs-on: windows-latest
 
    steps:
    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # 3. Restore dependencies
    - name: Restore dependencies
      run: dotnet restore WebAppBuild/WebAppBuild.slnx

    # 4. Build
    - name: Build solution
      run: dotnet build WebAppBuild/WebAppBuild.slnx --configuration Release --no-restore

    # 5. Publish
    - name: Publish app
      run: dotnet publish WebAppBuild/WebAppBuild.slnx -c Release -o publish --no-build

    # 6. Stop IIS App Pool before deployment
    - name: Stop IIS App Pool
      run: |
        Import-Module WebAdministration
        Stop-WebAppPool -Name "DefaultAppPool"
    
    # 7. Ensure deployment folder exists
    - name: Prepare deployment folder
      run: |
        if (!(Test-Path "D:\Deploy\WebAppBuild")) {
            New-Item -ItemType Directory -Path "D:\Deploy\WebAppBuild" -Force
        }
    
    # 8. Deploy files
    - name: Deploy to IIS folder
      run: |
        Copy-Item -Path publish\* -Destination "D:\Deploy\WebAppBuild" -Recurse -Force
    
    # 9. Start IIS App Pool
    - name: Start IIS App Pool
      run: |
        Import-Module WebAdministration
        Start-WebAppPool -Name "DefaultAppPool"
